<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>

<style>

body{
font-family:Arial,sans-serif;
background:pink;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:420px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

/* Add Button */

.addBtn{
padding:12px 20px;
font-size:16px;
background:#ff4da6;
}

.addBtn:hover{
background:#e60073;
}

/* Delete Button */

.deleteBtn{
padding:6px 12px;
background:#ff4da6;
}

.deleteBtn:hover{
background:#e60073;
}

ul{
padding:0;
}

li{
list-style:none;
background:#f2f2f2;
margin-top:12px;
padding:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.right{
display:flex;
align-items:center;
gap:10px;
}

.time{
font-size:12px;
color:gray;
}

.done{
text-decoration:line-through;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<h2>To-Do List</h2>

<div class="input-area">
<input type="text" id="taskInput" placeholder="Enter task">
<button class="addBtn" onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

let input=document.getElementById("taskInput");
let text=input.value.trim();

if(text===""){
alert("Enter a task");
return;
}

let li=document.createElement("li");

let task=document.createElement("span");
task.textContent=text;

let right=document.createElement("div");
right.className="right";

let time=document.createElement("span");
time.className="time";
time.textContent=new Date().toLocaleTimeString();

let checkbox=document.createElement("input");
checkbox.type="checkbox";

checkbox.onclick=()=>task.classList.toggle("done");

let del=document.createElement("button");
del.textContent="Delete";
del.className="deleteBtn";

del.onclick=()=>li.remove();

right.append(time,checkbox,del);
li.append(task,right);

document.getElementById("taskList").appendChild(li);

input.value="";
}

</script>

</body>
</html>
